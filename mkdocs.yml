site_name: ctrlmap
site_description: Privacy-preserving GRC automation CLI
site_url: https://joshdoesit.github.io/ctrlmap

repo_url: https://github.com/JoshDoesIT/ctrlmap
repo_name: JoshDoesIT/ctrlmap

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

nav:
  - Home: index.md
  - Architecture: architecture.md
  - API Reference:
    - Models: api/models.md
    - Parse: api/parse.md
    - Index: api/index.md
    - Map: api/map.md
    - LLM: api/llm.md
    - Export: api/export.md
    - Eval: api/eval.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
            members_order: source
            docstring_style: google
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.snippets:
      base_path: .
  - toc:
      permalink: true
